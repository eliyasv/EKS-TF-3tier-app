apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: mern-app
data:
  # MongoDB replica set connection string (HA with auto-failover)
  MONGO_CONN_STR: "mongodb://mongodb-0.mongodb-svc:27017,mongodb-1.mongodb-svc:27017,mongodb-2.mongodb-svc:27017/mern-todo?authSource=admin&replicaSet=rs0"
  USE_DB_AUTH: "true"
  PORT: "5000"
